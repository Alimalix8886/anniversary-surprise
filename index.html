<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 1 Year Anniversary Meri Jawn❤️</title>

  <style>
    body {
      background: linear-gradient(45deg, #ff4e8a, #ff9eb5);
      text-align: center;
      font-family: 'Arial', sans-serif;
      color: white;
      position: relative;
      overflow: hidden;
    }

    h1 {
      font-size: 50px;
      margin-top: 100px;
      text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.4);
    }

    .message {
      font-size: 22px;
      margin-top: 30px;
      display: none;
      animation: fadeIn 2s ease-out;
    }

    .heart {
      position: absolute;
      color: white;
      font-size: 40px;
      animation: fall 5s infinite;
      pointer-events: none;
    }

    .heart:nth-child(odd) {
      animation-duration: 4s;
    }

    .heart:nth-child(even) {
      animation-duration: 6s;
    }

    @keyframes fall {
      0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    button {
      background: #ff4e8a;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 20px;
      font-size: 20px;
      cursor: pointer;
      margin-top: 50px;
      transition: all 0.3s;
    }

    button:hover {
      background: #ff9eb5;
      transform: scale(1.1);
    }

    .timer {
      font-size: 24px;
      margin-top: 30px;
    }

    #slideshow {
      margin-top: 50px;
      max-width: 80%;
      margin: auto;
      display: none;
    }

    #slideshow img {
      width: 100%;
      border-radius: 10px;
    }

    /* Falling hearts */
    .heart {
      position: absolute;
      top: -10px;
      left: 50%;
      animation: fall 5s infinite linear;
    }
  </style>
</head>
<body>
  <h1>Happy 1 Year Anniversary ❤️</h1>
  <p>My Begum,Miss Mehru Fatima Ali ji </p>

  <button onclick="showMessage()">Click to Reveal the Love 💌</button>

  <div class="message" id="specialMessage">
    <p>I Love You soo Much Mela Bachawww 🥺💗,
      ALHAMDULIALLAH Ap Mery pas Hain 🫶🏼,Thanks For Comming In My Life Meri Jawwwwwn 💋🫂💗</p>
  </div>

  <div id="slideshow">
    <img src="https://github.com/Alimalix8886/anniversary-surprise/blob/42d92d832618c25d123986cc89b751d2d5963e06/photo1.jpeg?raw=true" alt="Your photo 1">
    <img src="https://github.com/Alimalix8886/anniversary-surprise/blob/42d92d832618c25d123986cc89b751d2d5963e06/photo1.jpeg?raw=true" alt="Your photo 2">
    <img src="https://github.com/Alimalix8886/anniversary-surprise/blob/f36434bf8561817f7e5c82dbe3ee627faa6e4917/photo3.jpeg?raw=true" alt="Your photo 3">
</div>

  <div class="timer" id="loveTimer"></div>

  <button onclick="document.getElementById('audio').play()">Play Song</button>

<audio id="audio" loop>
  <source src="https://raw.githubusercontent.com/Alimalix8886/anniversary-surprise/9faa675676fcd22743e938afbffe448cc38292ab/Audio.mpeg" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

  <script>
    // Show love message
    function showMessage() {
      document.getElementById("specialMessage").style.display = "block";
      startSlideshow();
    }

    // Timer function for 1 year
    function startLoveTimer() {
      const startDate = new Date("2025-03-12T00:00:00");  // Change to your anniversary date
      setInterval(function() {
        const currentTime = new Date();
        const diff = currentTime - startDate;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("loveTimer").innerHTML = `Time spent together: ${days} days ${hours} hours ${minutes} minutes`;
      }, 1000);
    }

    // Slideshow function
    function startSlideshow() {
      let currentSlide = 0;
      const slides = document.querySelectorAll("#slideshow img");
      document.getElementById("slideshow").style.display = "block";
      
      setInterval(function() {
        slides[currentSlide].style.display = "none";
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].style.display = "block";
      }, 3000);
    }

    // Generate falling hearts animation
    function generateHearts() {
      setInterval(function() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = `${Math.random() * 100}vw`;
        document.body.appendChild(heart);
      }, 500);
    }

    // Start the timer and heart animation
    startLoveTimer();
    generateHearts();
  </script>
</body>
</html>
